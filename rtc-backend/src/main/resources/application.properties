spring.mvc.static-path-pattern=/**
spring.resources.static-locations=classpath:/static/

# LOCALE
spring.mvc.locale-resolver=fixed
spring.mvc.locale=pt_BR

# MySQL Database Connection Properties
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/RealTimeChat?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=5624

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update

# Springdoc OpenApi 3.1 & Swagger 3
springdoc.swagger-ui.path=/docs-chat.html
springdoc.api-docs.path=/docs-chat
springdoc.packagesToScan=com.rtchat_api.real_time_chat_api.web.controller
